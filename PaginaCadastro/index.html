<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie Sua Conta!</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../PaginaCadastro/style.css">
</head>
<body>
    <div class="corpo-cartao">
        <div class="cartao-conteudo">
            <h2 class="fw-bold titulo-principal">Crie sua conta!</h2>

            <input type="text" id="InputNome" class="input-cadastro" placeholder="Nome">
            <input type="email" id="InputEmail" class="input-cadastro" placeholder="E-mail">
            <input type="password" id="InputSenha" class="input-cadastro" placeholder="Senha">
            <button id="btn-cadastrar"  class="botao-cadastro">Cadastrar</button>
    

        </div>
    </div>

    
    <script src="../PaginaCadastro/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
